# ── Upstream servers ─────────────────────────────────────────────
upstream frontend_upstream {
    server frontend:3000;
    keepalive 16;
}

upstream backend_upstream {
    server backend:5000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect (uncomment when SSL is configured) ─────
# server {
#     listen 80;
#     server_name ziaai.vercel.app;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ─────────────────────────────────────────────
server {
    listen 80;
    server_name localhost ziaai.vercel.app;

    client_max_body_size 10M;

    # ── API → Backend ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # ── Stricter rate limit for contact endpoint ──────────────────
    location /api/v1/contact {
        limit_req zone=contact burst=5 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Swagger docs (disable in strict prod) ─────────────────────
    location /api/docs {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
    }

    # ── Next.js Frontend ──────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;

        # Cache static Next.js assets
        location /_next/static/ {
            proxy_pass http://frontend_upstream;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400, immutable";
        }
    }

    # ── Health check endpoint (for load balancer) ─────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Block hidden files ────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
