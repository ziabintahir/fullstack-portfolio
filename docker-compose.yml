version: "3.9"

# ─────────────────────────────────────────────────────────────────────
# Portfolio Full-Stack Docker Compose
# Services: MySQL · Backend (Node/Express) · Frontend (Next.js) · Nginx
# ─────────────────────────────────────────────────────────────────────

services:

  # ── MySQL Database ──────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootSecret123}
      MYSQL_DATABASE:      ${DB_NAME:-portfolio_db}
      MYSQL_USER:          ${DB_USER:-portfolio_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-portfolio_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"   # Expose only in dev; remove in production
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootSecret123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - portfolio_net

  # ── Backend (Node.js + Express) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: portfolio_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST:     db
      DB_PORT:     3306
      DB_NAME:     ${DB_NAME:-portfolio_db}
      DB_USER:     ${DB_USER:-portfolio_user}
      DB_PASSWORD: ${DB_PASSWORD:-portfolio_pass}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend (Next.js) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
    container_name: portfolio_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio_net

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: portfolio_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend
    networks:
      - portfolio_net

# ── Volumes ─────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  backend_logs:
    driver: local
  nginx_certs:
    driver: local

# ── Network ─────────────────────────────────────────────────────────
networks:
  portfolio_net:
    driver: bridge
